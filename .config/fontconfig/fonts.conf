<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
    <alias>
        <family>serif</family>
        <prefer>
            <family>RobotoMono Nerd Font Propo</family>
        </prefer>
    </alias>
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>RobotoMono Nerd Font Propo</family>
        </prefer>
    </alias>
    <alias>
        <family>monospace</family>
        <prefer>
            <family>RobotoMono Nerd Font</family>
        </prefer>
    </alias>

    <match target="pattern">
        <test name="family">
            <string>monospace</string>
        </test>
        <edit name="weight" mode="assign">
            <double>700</double>> <!-- Изменяем на жирный вес -->
        </edit>
    </match>
</fontconfig>
